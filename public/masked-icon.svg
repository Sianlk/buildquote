    <ellipse cx="156" cy="120" rx="120" ry="45" fill="#D4A017"/>
    <path d="M36 120 C36 60 276 60 276 120 L276 140 C276 140 156 160 156 160 C156 160 36 140 36 140 Z" fill="#F5C518"/>
    <rect x="86" y="130" width="140" height="20" rx="5" fill="#D4A017"/>
